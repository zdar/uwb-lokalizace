; ================================================================
; FLASHING MODE SWITCH
; ================================================================
; This project has TWO build environments. Only ONE is active
; by default when you hit the PlatformIO "Upload" button in VS Code.
;
; 1) USB / SERIAL FLASH  (default)  →  env:esp32s3
;    Use this when the ESP32 is plugged into your PC via USB cable.
;    Just hit the Upload button — no extra steps needed.
;
; 2) WIFI / OTA FLASH              →  env:esp32s3-ota
;    Use this when the ESP32 is already on WiFi (no USB cable).
;    You MUST pass the node's IP address manually:
;
;        pio run -e esp32s3-ota -t upload --upload-port <IP>
;
;    Or use the helper script (opens the 2-min OTA window first):
;
;        python scripts/ota_flash_all.py --ip <IP>
;
; TO SWITCH DEFAULTS:
;   - Change the line below to:  default_envs = esp32s3-ota
;   - Or use the command palette: Ctrl+Shift+P → "PlatformIO: Switch Project Environment"
; ================================================================

[platformio]
default_envs = esp32s3-ota

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =

; Match Arduino IDE serial behavior - use UART0 for Serial
; Removed USB CDC flags to use standard UART serial like Arduino IDE

; Monitor settings
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_dtr = 0
monitor_rts = 0

; Ensure OTA partition table is used (two app slots)
board_build.partitions = default.csv

; Automatically download the exact library versions from your code
lib_deps =
    adafruit/Adafruit GFX Library @ 1.11.7
    adafruit/Adafruit BusIO @ 1.14.4
    adafruit/Adafruit SSD1306 @ 2.5.7

; ------------------------------------------------------------------
; OTA environment — use this when flashing over WiFi
; Example: pio run -e esp32s3-ota -t upload --upload-port 192.168.4.2
; ------------------------------------------------------------------
[env:esp32s3-ota]
extends = env:esp32s3
upload_protocol = espota
; upload_port is set dynamically via --upload-port or scripts/ota_flash_all.py
upload_flags =
    --auth=rtlsota12