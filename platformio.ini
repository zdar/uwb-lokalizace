[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Match Arduino IDE serial behavior - use UART0 for Serial
; Removed USB CDC flags to use standard UART serial like Arduino IDE

; Monitor settings
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_dtr = 0
monitor_rts = 0

; Ensure OTA partition table is used (two app slots)
board_build.partitions = default.csv

; Automatically download the exact library versions from your code
lib_deps =
    adafruit/Adafruit GFX Library @ 1.11.7
    adafruit/Adafruit BusIO @ 1.14.4
    adafruit/Adafruit SSD1306 @ 2.5.7

; ------------------------------------------------------------------
; OTA environment — use this when flashing over WiFi
; Example: pio run -e esp32s3-ota -t upload --upload-port 192.168.4.2
; ------------------------------------------------------------------
[env:esp32s3-ota]
extends = env:esp32s3
upload_protocol = espota
upload_port = 192.168.4.2
upload_flags =
    --auth=rtlsota12