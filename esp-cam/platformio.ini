[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; PSRAM is required for the camera JPEG buffers.
; AI-Thinker ESP32-CAM has 4 MB PSRAM.
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Match Arduino IDE serial behavior
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_dtr = 0
monitor_rts = 0

; Use the board default partition table for the ESP32-CAM project.
; If OTA is enabled later, switch to an OTA-enabled partitions file.

lib_deps =
